<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperación de Contraseña</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px;">
    <div style="max-width: 600px; margin: 0 auto; background-color: #ffffff; padding: 30px; border-radius: 5px;">
        <div style="text-align: center; margin-bottom: 20px;">
            <h1>EasyCommerce</h1>
        </div>
        <p>Hola {{ name }},</p>
        <p>Hemos recibido una solicitud para recuperar tu contraseña.</p>
        <p><strong>Aviso: Este enlace expira en {{ expiry_time }} (1 hora).</strong></p>
        <div style="text-align: center; margin-top: 30px;">
            <a href="{{ recovery_link }}" style="background-color: #007bff; color: #ffffff; padding: 10px 20px; text-decoration: none; border-radius: 5px;">Recuperar Contraseña</a>
        </div>
        <p style="margin-top: 20px; font-size: 12px; color: #777;">Si no solicitaste esto, puedes ignorar este correo.</p>
    </div>
</body>
</html>
