org: ${env:ORG_NAME}
service: easycommerce

plugins:
  - serverless-dotenv-plugin

provider:
  name: aws
  runtime: python3.12
  region: us-east-1
  timeout: 30
  iam:
    role: arn:aws:iam::${env:ID_AWS}:role/LabRole
  environment:
    API_KEY_LLM: ${env:API_KEY_LLM}
    USERS_TABLE: ${env:USERS_TABLE}
    BUSINESSES_TABLE: ${env:BUSINESSES_TABLE}
    REPORTS_TABLE: ${env:REPORTS_TABLE}
    EVENT_BUS_NAME: ${env:EVENT_BUS_NAME}

functions:
  create_business:
    handler: src/functions/business/create_business.handler
    events:
      - http:
          path: business
          method: post
          cors: true

  read_business:
    handler: src/functions/business/read_business.handler
    events:
      - http:
          path: business/{id}
          method: get
          cors: true
      - http:
          path: business
          method: get
          cors: true

  generate_recommendation:
    handler: src/functions/recommendation/generate_recommendation.handler
    events:
      - eventBridge:
          eventBus: easycommerce-bus
          pattern:
            source:
              - easycommerce.business
            detail-type:
              - business.created
              - business.updated

  generate_report:
    handler: src/functions/report/generate_report.handler
    events:
      - eventBridge:
          eventBus: easycommerce-bus
          pattern:
            source:
              - easycommerce.recommendation
            detail-type:
              - recommendation.generated

resources:
  Resources:
    BusinessesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${env:BUSINESSES_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: businessId
            AttributeType: S
          - AttributeName: userId
            AttributeType: S
        KeySchema:
          - AttributeName: businessId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: userId-index
            KeySchema:
              - AttributeName: userId
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    ReportsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${env:REPORTS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: reportId
            AttributeType: S
          - AttributeName: businessId
            AttributeType: S
        KeySchema:
          - AttributeName: reportId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: businessId-index
            KeySchema:
              - AttributeName: businessId
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    EasyCommerceEventBus:
      Type: AWS::Events::EventBus
      Properties:
        Name: ${env:EVENT_BUS_NAME}